---
# yamllint disable rule:line-length rule:truthy
name: Build and publish add-on

env:
  MONITORED_FILES: "apparmor.txt build.yaml config.yaml Dockerfile data rootfs"

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    name: Initialize builds
    outputs:
      changed_files: ${{ steps.changed_files.outputs.all }}
      changed_addons: ${{ steps.changed_addons.outputs.addons }}
      changed: ${{ steps.changed_addons.outputs.changed }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4.1.6

      - name: Get changed files
        id: changed_files
        if: github.event_name == 'pull_request'
        uses: masesgroup/retrieve-changed-files@v3.0.0
        with:
          format: 'csv'

      - name: Get changed files (push)
        id: changed_files_push
        if: github.event_name == 'push'
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **
          separator: ','

      - name: Get add-ons
        id: addons
        run: |
          declare -a addons
          for addon in $(find ./ -name config.yaml | cut -d "/" -f2 | sort -u); do
            addons+=("$addon");
          done
          echo "addons=${addons[@]}" >> "$GITHUB_OUTPUT"

      - name: Get changed add-ons
        id: changed_addons
        run: |
          # For workflow_dispatch, build all addons
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            addons="$(echo ${{ steps.addons.outputs.addons }} | sed 's/ / /g' | sed 's/\([^ ]\)/"\1"/g' | sed 's/ /,/g')"
            echo "Changed add-ons (workflow_dispatch): $addons";
            echo "changed=true" >> "$GITHUB_OUTPUT";
            echo "addons=[$addons]" >> "$GITHUB_OUTPUT";
            exit 0
          fi

          # Get changed files based on event type
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            changed_files="${{ steps.changed_files.outputs.all }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            changed_files="${{ steps.changed_files_push.outputs.all_changed_files }}"
          fi

          echo "Changed files: $changed_files"

          # For push/PR, detect changed files
          declare -a changed_addons
          for addon in ${{ steps.addons.outputs.addons }}; do
            echo "Checking addon: $addon"
            # Convert comma-separated to newline-separated for easier matching
            echo "$changed_files" | tr ',' '\n' | while read -r file; do
              if [[ "$file" =~ ^$addon/ ]]; then
                for mon_file in ${{ env.MONITORED_FILES }}; do
                  if [[ "$file" == "$addon/$mon_file" ]]; then
                    echo "Found monitored file: $file"
                    if [[ ! " ${changed_addons[@]} " =~ " ${addon} " ]]; then
                      changed_addons+=("$addon")
                      break 2
                    fi
                  fi
                done
              fi
            done
          done

          echo "Detected changed addons: ${changed_addons[@]}"

          # Format as JSON array
          json_addons=""
          for addon in "${changed_addons[@]}"; do
            json_addons="${json_addons}\"${addon}\","
          done
          json_addons="[${json_addons%,}]"

          if [[ ${#changed_addons[@]} -gt 0 ]]; then
            echo "Changed add-ons: $json_addons";
            echo "changed=true" >> "$GITHUB_OUTPUT";
            echo "addons=$json_addons" >> "$GITHUB_OUTPUT";
          else
            echo "No add-on had any monitored files changed (${{ env.MONITORED_FILES }})";
          fi

  build:
    needs: init
    runs-on: ubuntu-latest
    if: needs.init.outputs.changed == 'true'
    name: Build ${{ matrix.arch }} ${{ matrix.addon }} add-on
    strategy:
      matrix:
        addon: ${{ fromJson(needs.init.outputs.changed_addons) }}
        arch: ["aarch64", "amd64", "armhf", "armv7", "i386"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.1.6

      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ matrix.addon }}"

      - name: Check add-on
        id: check
        run: |
          if [[ "${{ steps.info.outputs.architectures }}" =~ ${{ matrix.arch }} ]]; then
             echo "build_arch=true" >> "$GITHUB_OUTPUT";
           else
             echo "${{ matrix.arch }} is not a valid arch for ${{ matrix.addon }}, skipping build";
          fi

      - name: Set build arguments
        if: steps.check.outputs.build_arch == 'true'
        run: |
          if [[ -z "${{ github.head_ref }}" ]] && [[ "${{ github.event_name }}" == "push" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              echo "BUILD_ARGS=" >> $GITHUB_ENV;
              echo "PUBLISH=true" >> $GITHUB_ENV;
          else
              echo "BUILD_ARGS=--test" >> $GITHUB_ENV;
              echo "PUBLISH=false" >> $GITHUB_ENV;
          fi

      - name: Login to GitHub Container Registry
        if: env.PUBLISH == 'true'
        uses: docker/login-action@v3.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        if: env.BUILD_ARGS == '--docker-hub-check'
        uses: docker/login-action@v3.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build ${{ matrix.addon }} add-on
        if: steps.check.outputs.build_arch == 'true'
        uses: home-assistant/builder@2024.03.5
        with:
          args: |
            ${{ env.BUILD_ARGS }} \
            --${{ matrix.arch }} \
            --target /data/${{ matrix.addon }} \
            --addon \
            ${{ env.PUBLISH == 'true' && '--publish' || '' }}
