---
# yamllint disable rule:line-length rule:truthy
name: Build and publish add-on

env:
  BUILD_ARGS: "--test"
  MONITORED_FILES: "apparmor.txt build.yaml config.yaml Dockerfile data rootfs"

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    name: Initialize builds
    outputs:
      changed_files: ${{ steps.changed_files.outputs.all }}
      changed_addons: ${{ steps.changed_addons.outputs.addons }}
      changed: ${{ steps.changed_addons.outputs.changed }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Get changed files
        id: changed_files
        uses: masesgroup/retrieve-changed-files@v3.0.0

      - name: Get add-ons
        id: addons
        run: |
          declare -a addons
          for addon in $(find ./ -name config.yaml | cut -d "/" -f2 | sort -u); do
            addons+=("$addon");
          done
          echo "addons=${addons[@]}" >> "$GITHUB_OUTPUT"

      - name: Get changed add-ons
        id: changed_addons
        env:
          ADDONS: ${{ steps.addons.outputs.addons }}
          CHANGED_FILES: ${{ steps.changed_files.outputs.all }}
        run: |
          echo "ADDONS: ${ADDONS}"
          echo "CHANGED_FILES: ${CHANGED_FILES}"
          echo "MONITORED_FILES: ${{ env.MONITORED_FILES }}"

          declare -a changed_addons
          for addon in ${ADDONS}; do
            if [[ "${CHANGED_FILES}" =~ $addon ]]; then
              for file in ${{ env.MONITORED_FILES }}; do
                if [[ "${CHANGED_FILES}" =~ $addon/$file ]]; then
                  if [[ ! "${changed_addons[@]}" =~ $addon ]]; then
                    changed_addons+=("\"${addon}\",");
                  fi
                fi
              done
            fi
          done

          echo "changed_addons array: ${changed_addons[@]}"

          changed=$(echo ${changed_addons[@]} | rev | cut -c 2- | rev)
          echo "changed variable: '$changed'"

          if [[ -n ${changed} ]]; then
            echo "Changed add-ons: $changed";
            echo "changed=true" >> "$GITHUB_OUTPUT";
            echo "addons=[$changed]" >> "$GITHUB_OUTPUT";
          else
            echo "No add-on had any monitored files changed (${{ env.MONITORED_FILES }})";
            # Set default values to ensure outputs exist
            echo "changed=false" >> "$GITHUB_OUTPUT";
            echo "addons=[]" >> "$GITHUB_OUTPUT";
          fi

          echo "=== Final outputs ==="
          echo "changed output: $(grep '^changed=' $GITHUB_OUTPUT || echo 'NOT SET')"
          echo "addons output: $(grep '^addons=' $GITHUB_OUTPUT || echo 'NOT SET')"

  build:
    needs: init
    runs-on: ${{ matrix.runs-on }}
    if: needs.init.outputs.changed == 'true'
    name: Build ${{ matrix.arch }} ${{ matrix.addon }} add-on
    strategy:
      matrix:
        addon: ${{ fromJson(needs.init.outputs.changed_addons) }}
        arch: ["aarch64", "amd64"]
        include:
          - runs-on: ubuntu-24.04
            arch: amd64
          - runs-on: ubuntu-24.04-arm
            arch: aarch64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: "./${{ matrix.addon }}"

      - name: Check app
        id: check
        env:
          ADDON: ${{ matrix.addon }}
          ARCH: ${{ matrix.arch }}
          ARCHITECTURES: ${{ steps.info.outputs.architectures }}
        run: |
          if [[ "${ARCHITECTURES}" =~ ${ARCH} ]]; then
             echo "build_arch=true" >> "$GITHUB_OUTPUT";
           else
             echo "${ARCH} is not a valid arch for ${ADDON}, skipping build";
          fi

      - name: Set build arguments
        if: steps.check.outputs.build_arch == 'true' && github.head_ref == '' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          echo "BUILD_ARGS=" >> "$GITHUB_ENV"
          echo "PUBLISH=true" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        if: env.PUBLISH == 'true'
        uses: docker/login-action@v3.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        if: env.BUILD_ARGS == '--docker-hub-check'
        uses: docker/login-action@v3.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build ${{ matrix.addon }} add-on
        if: steps.check.outputs.build_arch == 'true'
        uses: home-assistant/builder@2024.03.5
        with:
          image: ${{ matrix.arch }}
          args: |
            ${{ env.BUILD_ARGS }} \
            --${{ matrix.arch }} \
            --target /data/${{ matrix.addon }} \
            --addon \
            ${{ env.PUBLISH == 'true' && '--publish' || '' }}
