---
name: Build and Publish Docker Images

on:
  push:
    branches: ["master"]
    paths:
      - "letsencrypt/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kylin7226/addons

jobs:
  build-and-push:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: aarch64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retry Docker pull
        if: matrix.arch == 'aarch64'
        run: |
          # Retry pulling base image in case of network issues
          for i in 1 2 3; do
            if docker pull ${{ steps.meta.outputs.BUILD_FROM }}; then
              echo "Successfully pulled base image"
              break
            fi
            echo "Retry $i/3..."
            sleep 10
          done

      - name: Extract metadata
        id: meta
        run: |
          VERSION=$(grep '^version:' letsencrypt/config.yaml | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"
          
          # Read base image from build.yaml based on architecture
          BUILD_FROM=$(grep "${{ matrix.arch }}:" letsencrypt/build.yaml | awk '{print $2}')
          echo "BUILD_FROM=${BUILD_FROM}" >> $GITHUB_OUTPUT
          echo "Base image for ${{ matrix.arch }}: ${BUILD_FROM}"
          
          # Read build args from build.yaml
          ACME_VERSION=$(grep 'ACME_VERSION:' letsencrypt/build.yaml | awk '{print $2}')
          CERTBOT_VERSION=$(grep 'CERTBOT_VERSION:' letsencrypt/build.yaml | awk '{print $2}')
          CRYPTOGRAPHY_VERSION=$(grep 'CRYPTOGRAPHY_VERSION:' letsencrypt/build.yaml | awk '{print $2}')
          CERTBOT_DNS_MULTI_VERSION=$(grep 'CERTBOT_DNS_MULTI_VERSION:' letsencrypt/build.yaml | awk '{print $2}')
          CERTBOT_DNS_ALIYUN_VERSION=$(grep 'CERTBOT_DNS_ALIYUN_VERSION:' letsencrypt/build.yaml | awk '{print $2}')
          CERTBOT_DNS_EURODNS_VERSION=$(grep 'CERTBOT_DNS_EURODNS_VERSION:' letsencrypt/build.yaml | awk '{print $2}')
          CERTBOT_DNS_NORISNETWORK_VERSION=$(grep 'CERTBOT_DNS_NORISNETWORK_VERSION:' letsencrypt/build.yaml | awk '{print $2}')
          CERTBOT_DNS_AZURE_VERSION=$(grep 'CERTBOT_DNS_AZURE_VERSION:' letsencrypt/build.yaml | awk '{print $2}')
          CERTBOT_DNS_HURRICANE_ELECTRIC_VERSION=$(grep 'CERTBOT_DNS_HURRICANE_ELECTRIC_VERSION:' letsencrypt/build.yaml | awk '{print $2}')
          
          echo "ACME_VERSION=${ACME_VERSION}" >> $GITHUB_OUTPUT
          echo "CERTBOT_VERSION=${CERTBOT_VERSION}" >> $GITHUB_OUTPUT
          echo "CRYPTOGRAPHY_VERSION=${CRYPTOGRAPHY_VERSION}" >> $GITHUB_OUTPUT
          echo "CERTBOT_DNS_MULTI_VERSION=${CERTBOT_DNS_MULTI_VERSION}" >> $GITHUB_OUTPUT
          echo "CERTBOT_DNS_ALIYUN_VERSION=${CERTBOT_DNS_ALIYUN_VERSION}" >> $GITHUB_OUTPUT
          echo "CERTBOT_DNS_EURODNS_VERSION=${CERTBOT_DNS_EURODNS_VERSION}" >> $GITHUB_OUTPUT
          echo "CERTBOT_DNS_NORISNETWORK_VERSION=${CERTBOT_DNS_NORISNETWORK_VERSION}" >> $GITHUB_OUTPUT
          echo "CERTBOT_DNS_AZURE_VERSION=${CERTBOT_DNS_AZURE_VERSION}" >> $GITHUB_OUTPUT
          echo "CERTBOT_DNS_HURRICANE_ELECTRIC_VERSION=${CERTBOT_DNS_HURRICANE_ELECTRIC_VERSION}" >> $GITHUB_OUTPUT
          
          echo "All build args extracted from build.yaml"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./letsencrypt
          file: ./letsencrypt/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.arch }}-addon-letsencrypt:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.arch }}-addon-letsencrypt:latest
          build-args: |
            BUILD_FROM=${{ steps.meta.outputs.BUILD_FROM }}
            BUILD_ARCH=${{ matrix.arch }}
            ACME_VERSION=${{ steps.meta.outputs.ACME_VERSION }}
            CERTBOT_DNS_MULTI_VERSION=${{ steps.meta.outputs.CERTBOT_DNS_MULTI_VERSION }}
            CERTBOT_DNS_ALIYUN_VERSION=${{ steps.meta.outputs.CERTBOT_DNS_ALIYUN_VERSION }}
            CERTBOT_DNS_EURODNS_VERSION=${{ steps.meta.outputs.CERTBOT_DNS_EURODNS_VERSION }}
            CERTBOT_DNS_NORISNETWORK_VERSION=${{ steps.meta.outputs.CERTBOT_DNS_NORISNETWORK_VERSION }}
            CERTBOT_DNS_AZURE_VERSION=${{ steps.meta.outputs.CERTBOT_DNS_AZURE_VERSION }}
            CERTBOT_DNS_HURRICANE_ELECTRIC_VERSION=${{ steps.meta.outputs.CERTBOT_DNS_HURRICANE_ELECTRIC_VERSION }}
            CERTBOT_VERSION=${{ steps.meta.outputs.CERTBOT_VERSION }}
            CRYPTOGRAPHY_VERSION=${{ steps.meta.outputs.CRYPTOGRAPHY_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
